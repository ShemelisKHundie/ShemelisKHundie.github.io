<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}{% if page.title %} | {{ page.title }}{% endif %}</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #24292e;
      background-color: #fff;
    }
    
    /* Main container - everything scrolls normally */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
    }
    
    /* Header - normal flow (not fixed/sticky) */
    header {
      border-bottom: 1px solid #eaecef;
      padding-bottom: 1rem;
      margin-bottom: 2rem;
      background-color: #fff;
    }
    
    header h1 {
      margin-bottom: 0.25rem;
      font-size: 2rem;
    }
    
    header p {
      color: #586069;
      margin-top: 0;
      margin-bottom: 1rem;
    }
    
    nav {
      margin-top: 1rem;
    }
    
    nav a {
      color: #0366d6;
      text-decoration: none;
      margin-right: 1rem;
    }
    
    nav a:hover {
      text-decoration: underline;
    }
    
    /* Profile image */
    .profile-img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      float: left;
      margin-right: 2rem;
      margin-bottom: 1rem;
    }
    
    .clearfix::after {
      content: "";
      clear: both;
      display: table;
    }
    
    /* Main content - normal scroll */
    main {
      min-height: 50vh;
    }
    
    /* Footer - normal flow (not fixed) */
    footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid #eaecef;
      font-size: 0.875rem;
      color: #586069;
      text-align: center;
      background-color: #fff;
    }
    
    /* Headings */
    h2 {
      border-bottom: 1px solid #eaecef;
      padding-bottom: 0.3rem;
      margin-top: 2rem;
      margin-bottom: 1rem;
    }
    
    h3 {
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
    }
    
    p {
      margin-bottom: 1rem;
    }
    
    ul, ol {
      padding-left: 2rem;
      margin-bottom: 1rem;
    }
    
    li {
      margin-bottom: 0.25rem;
    }
    
    a {
      color: #0366d6;
      text-decoration: none;
    }
    
    a:hover {
      text-decoration: underline;
    }
    
    /* Responsive */
    @media (max-width: 600px) {
      .container {
        padding: 1rem;
      }
      
      .profile-img {
        float: none;
        display: block;
        margin: 0 auto 1rem auto;
      }
      
      nav a {
        display: inline-block;
        margin-bottom: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    {% include header.html %}
    
    <main>
      {{ content }}
    </main>
    
    <footer>
      <p>© {{ site.time | date: '%Y' }} {{ site.title }}</p>
    </footer>
  </div>
</body>
</html>
