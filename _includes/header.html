<header>
  <div style="display: flex; align-items: center; gap: 20px; flex-wrap: wrap; margin-bottom: 20px;">
    <img src="/profile.jpg" alt="{{ site.title }}" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 2px solid #eaecef;">
    <div>
      <h1 style="margin: 0;">{{ site.title }}</h1>
      {% if site.description %}
        <p style="margin: 5px 0 0 0; color: #586069;">{{ site.description }}</p>
      {% endif %}
    </div>
  </div>
  
  {% if site.navigation %}
    <nav>
      {% for item in site.navigation %}
        <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
        {% unless forloop.last %} | {% endunless %}
      {% endfor %}
    </nav>
  {% endif %}
</header>
