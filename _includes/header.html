<h1><a href="{{ '/' | absolute_url }}">{{ site.title }}</a></h1>
{% if site.description %}
<p>{{ site.description }}</p>
{% endif %}

{% if site.navigation %}
<nav>
  <ul>
    {% for item in site.navigation %}
    <li><a href="{{ item.url | relative_url }}">{{ item.title }}</a></li>
    {% endfor %}
  </ul>
</nav>
{% endif %}
